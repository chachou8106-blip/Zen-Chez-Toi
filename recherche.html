    <style>
        :root {
            --bg-sable: #f5f2ec; --blanc: #ffffff; --brun-sombre: #2b2622; --or-zen: #a67b51;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Georgia', serif; background-color: var(--bg-sable); color: var(--brun-sombre); line-height: 1.6; overflow-x: hidden; }

        /* HEADER & BADGE PINTEREST ZEN */
        header { position: absolute; top: 0; width: 100%; padding: 25px 0; z-index: 1000; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 50px; }
        .logo-area { display: flex; align-items: center; gap: 25px; }
        .logo img { max-height: 90px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        
        .pinterest-badge { 
            display: inline-flex; align-items: center; justify-content: center; 
            width: 32px; height: 32px; border: 1px solid rgba(255,255,255,0.4); 
            border-radius: 50%; color: #ffffff; text-decoration: none; 
            font-family: 'Georgia', serif; font-style: italic; font-size: 1.1rem;
            transition: all 0.4s ease; background: rgba(255,255,255,0.1); backdrop-filter: blur(2px);
        }
        .pinterest-badge:hover { background: var(--or-zen); border-color: var(--or-zen); transform: rotate(15deg) scale(1.1); box-shadow: 0 4px 15px rgba(166, 123, 81, 0.3); }

        nav ul { list-style: none; display: flex; gap: 30px; align-items: center; }
        nav a { text-decoration: none; color: #ffffff; font-variant: small-caps; font-size: 1.1em; text-shadow: 0 2px 5px rgba(0,0,0,0.6); transition: 0.3s; }
        nav a:hover { color: var(--or-zen); }

        /* HERO ZEN Raccourci pour la recherche */
        .hero {
            height: 45vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('assets/hero-accueil.jpg') center/cover no-repeat;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #ffffff;
            margin-bottom: -40px;
        }
        .hero h1 { font-size: 3em; font-weight: normal; letter-spacing: 4px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); font-variant: small-caps; line-height: 1.2; }

        /* BARRE DE RECHERCHE */
        .search-area { background: transparent; padding: 0 20px; text-align: center; position: relative; z-index: 10; }
        .search-container { max-width: 700px; margin: 0 auto; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 50px; }
        .search-container input { width: 100%; padding: 22px 35px; border: 2px solid var(--blanc); border-radius: 50px; font-size: 1.1em; outline: none; background: var(--blanc); }
        .search-container input:focus { border-color: var(--or-zen); }
        .search-container button { position: absolute; right: 8px; top: 8px; bottom: 8px; padding: 0 30px; border-radius: 40px; border: none; background: var(--brun-sombre); color: white; cursor: pointer; font-variant: small-caps; font-weight: bold; font-size: 1.1em; transition: 0.3s; }
        .search-container button:hover { background: var(--or-zen); }

        /* ZONE DES RÉSULTATS (Style Grimoire) */
        .results-wrapper { max-width: 1400px; margin: 60px auto; padding: 0 20px; min-height: 35vh; }
        .result-count { font-style: italic; color: #666; margin-bottom: 30px; text-align: center; font-size: 1.2em; }
        
        .chapitre { background: var(--blanc); padding: 50px; border-radius: 12px; margin-bottom: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .index-grid { column-count: 3; column-gap: 50px; list-style: none; }
        .index-grid li { margin-bottom: 15px; break-inside: avoid-column; position: relative; padding-left: 25px; }
        .index-grid li::before { content: "◈"; position: absolute; left: 0; color: var(--or-zen); opacity: 0.5; }
        .index-grid a { text-decoration: none; color: var(--brun-sombre); transition: 0.2s; font-size: 1.1em; }
        .index-grid a:hover { color: var(--or-zen); padding-left: 5px; }
        .category-tag { font-size: 0.75em; color: #888; font-style: italic; margin-left: 8px; }

        .no-results { text-align: center; padding: 40px; background: var(--blanc); border-radius: 12px; font-style: italic; color: var(--brun-sombre); }

        /* FOOTER */
        footer { background: var(--brun-sombre); color: #fff; padding: 60px 20px; text-align: center; margin-top: auto; }
        .footer-logo-small { height: 45px; margin-bottom: 25px; }
        .footer-nav-compact { display: flex; gap: 25px; list-style: none; justify-content: center; margin-bottom: 25px; padding: 0; }
        .footer-nav-compact a { color: #fff; text-decoration: none; font-size: 0.9em; opacity: 0.7; font-variant: small-caps; }

        @media (max-width: 992px) { .index-grid { column-count: 2; } }
        @media (max-width: 600px) { .index-grid { column-count: 1; } .hero h1 { font-size: 2.2em; } }
    </style>

        ];

        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const query = params.get('q');
            const searchInput = document.getElementById('searchInput');
            const resultCount = document.getElementById('resultCount');
            const resultsSection = document.getElementById('resultsSection');
            const resultsList = document.getElementById('resultsList');

            if (query) {
                searchInput.value = query;
                const lowerQuery = query.toLowerCase().trim();

                const matches = database.filter(item => 
                    item.title.toLowerCase().includes(lowerQuery) || 
                    item.cat.toLowerCase().includes(lowerQuery)
                );

                if (matches.length > 0) {
                    resultCount.innerHTML = `L'Oracle a trouvé <strong>${matches.length}</strong> réponse(s) pour "<em>${query}</em>" :`;
                    resultsSection.style.display = "block";
                    resultsList.innerHTML = "";
                    
                    matches.forEach(match => {
                        const li = document.createElement('li');
                        li.innerHTML = `<a href="${match.url}">${match.title} <span class="category-tag">(${match.cat})</span></a>`;
                        resultsList.appendChild(li);
                    });
                } else {
                    resultCount.innerHTML = "";
                    resultsSection.style.display = "block";
                    resultsList.innerHTML = `<div class="no-results">Le grimoire reste silencieux... Aucune recette trouvée pour "<em>${query}</em>".<br><br>Essayez un mot simple comme "vinaigre", "sommeil" ou "peau".</div>`;
                }
            } else {
                resultCount.innerText = "Saisissez un mot-clé ci-dessus pour interroger le grimoire.";
            }
        });
